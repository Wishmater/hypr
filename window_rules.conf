#-----------------┐
# APPLY TAG RULES |
#-----------------┘

# Apply "game" rules
windowrule {
  name = apply-tag-rules-game
  match:tag = game
  tag = -popup
  float = on
  monitor = $monitor1
  move = (0) (0)
  size = 1920 1080
  fullscreen = on
  rounding = 0
  idle_inhibit = focus
  suppress_event = fullscreen maximize fullscreenoutput
}

# Apply "persistent_popup" rules
windowrule {
  name = apply-tag-rules-persistent-group
  match:tag = persistent_popup
  tag = -popup
  float = on
  move = (20) (20)
}

# windowrule = fullscreenstate 0 0, tag:persistent_popup
# TODO: 3 make a script to stack multiple "persistent popups" below each other

# Apply "popup" rules
windowrule {
  name = apply-tag-rules-popup
  name = windowrule-28
  float = on
  match:tag = popup
}
windowrule {
  name = apply-tag-rules-popup-not-fullscreen
  dim_around = on
  move = (cursor_x+(min(max(-(monitor_w*0.5),0),monitor_w-window_w))) (cursor_y+(min(max(-32,0),monitor_h-window_h)))
  match:tag = popup
  match:fullscreen = 0
}



##########################
### APP-SPECIFIC RULES ###
##########################

# Float telegram media viewer popups
windowrule {
  name = app-specific-telegram
  float = on
  match:class = ^(org.telegram.desktop)$
  match:title = ^(Media viewer)$
}

